name: CI

on:
  push:
    branches: [main, "**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: "3.10.0"

      - name: Install lipo (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          which lipo || echo 'lipo available in Xcode toolchain'

      - name: Generate bindings and native library
        run: |
          chmod +x scripts/generate_bindings.sh
          ./scripts/generate_bindings.sh

      - name: Ensure generated bindings exist
        run: test -f lib/bdk.dart

      - name: Pub get
        run: dart pub get

      - name: Pub get (bdk_demo)
        working-directory: bdk_demo
        run: flutter pub get

      - name: Format check
        run: dart format --output=none --set-exit-if-changed lib test example bdk_demo/lib bdk_demo/test

      - name: Analyze
        run: dart analyze --fatal-infos --fatal-warnings lib test example

      - name: Analyze (bdk_demo)
        working-directory: bdk_demo
        run: flutter analyze

      - name: Run tests
        run: |
          dart test

      - name: Run tests (bdk_demo)
        working-directory: bdk_demo
        run: flutter test

  windows-smoke:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: "3.10.0"

      - name: Pub get
        run: dart pub get

      - name: Analyze
        run: dart analyze --fatal-infos --fatal-warnings lib test example

      - name: Run tests
        run: dart test

  android-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: "3.10.0"

      - name: Pub get (bdk_demo)
        working-directory: bdk_demo
        run: flutter pub get

      - name: Build Android debug APK (bdk_demo)
        working-directory: bdk_demo
        run: flutter build apk --debug --target-platform android-arm64

  android-alignment:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: "3.10.0"

      - name: Pub get
        run: dart pub get

      - name: Install Android NDK
        run: sdkmanager "ndk;27.1.12297006"

      - name: Build Android native library with NDK 27
        run: |
          rustup toolchain install 1.85.1 --profile minimal --target aarch64-linux-android
          NDK="$ANDROID_HOME/ndk/27.1.12297006"
          TOOLCHAIN="$NDK/toolchains/llvm/prebuilt/linux-x86_64"
          export ANDROID_NDK_HOME="$NDK"
          export ANDROID_NDK_ROOT="$NDK"
          export AR_aarch64_linux_android="$TOOLCHAIN/bin/llvm-ar"
          export CC_aarch64_linux_android="$TOOLCHAIN/bin/aarch64-linux-android35-clang"
          export CXX_aarch64_linux_android="$TOOLCHAIN/bin/aarch64-linux-android35-clang++"
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="$TOOLCHAIN/bin/aarch64-linux-android35-clang"
          export BINDGEN_EXTRA_CLANG_ARGS_aarch64_linux_android="--sysroot=$TOOLCHAIN/sysroot -I$TOOLCHAIN/sysroot/usr/include/aarch64-linux-android"
          rustup run 1.85.1 cargo build \
            --release \
            --manifest-path native/Cargo.toml \
            --package bdk_dart_ffi \
            --target aarch64-linux-android \
            --target-dir /tmp/bdk-dart-android-target \
            --config native/.cargo/config.toml

      - name: Verify NDK 27 native library alignment
        run: dart scripts/check_android_elf_alignment.dart /tmp/bdk-dart-android-target/aarch64-linux-android/release/libbdk_dart_ffi.so

      - name: Verify NDK 27 hook alignment
        run: |
          export ANDROID_NDK_HOME="$ANDROID_HOME/ndk/27.1.12297006"
          export ANDROID_NDK_ROOT="$ANDROID_NDK_HOME"
          dart scripts/check_android_hook_alignment.dart

  ios-smoke:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: "3.10.0"

      - name: Pub get (bdk_demo)
        working-directory: bdk_demo
        run: flutter pub get

      - name: Install CocoaPods deps (bdk_demo iOS)
        working-directory: bdk_demo/ios
        run: pod install

      - name: Build iOS simulator app (bdk_demo)
        working-directory: bdk_demo
        run: flutter build ios --simulator --no-codesign
